{% extends 'base.html' %}
{% block title %}Book Appointment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h3 class="mb-4">Book Counseling Appointment</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Consultant</label>
                        <select name="consultant" class="form-select" required>
                            <option value="">Select consultant</option>
                            {% for c in consultants %}
                            <option value="{{ c.id }}">{{ c.user.get_full_name }} - {{ c.specialization|default:"General" }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Purpose</label>
                        <textarea name="purpose" class="form-control" rows="3" required placeholder="Describe what you'd like to discuss..."></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Preferred Date</label>
                            <input type="date" name="preferred_date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Preferred Time</label>
                            <input type="time" name="preferred_time" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label">Duration (minutes)</label>
                        <input type="number" name="duration_minutes" class="form-control" value="60" min="30" max="120">
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Request</button>
                    <a href="{% url 'student_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
