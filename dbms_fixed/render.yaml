databases:
  - name: dbms
    plan: free
    databaseName: dbms
    user: dbms_user

services:
  - type: web
    plan: free
    name: ctlms
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn ctlms.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dbms
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: RENDER
        value: 1
      - key: DEBUG
        value: 0
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@gmail.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: admin
  