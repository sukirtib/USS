{% extends 'base.html' %}
{% block title %}Record Score{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body p-4">
        <h4 class="mb-1">Record Mock Test Score</h4>
        <p class="text-muted small mb-4">Batch: <strong>{{ batch.batch_name }}</strong> — {{ batch.course.course_name }}</p>
        {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Student</label>
            <select name="student" class="form-select" required>
              <option value="">Select student</option>
              {% for e in enrollments %}
              <option value="{{ e.student.id }}">{{ e.student.user.get_full_name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Mock Test</label>
            <select name="mock_test" class="form-select" required>
              <option value="">Select test</option>
              {% for mt in mock_tests %}
              <option value="{{ mt.id }}">{{ mt.mock_test_name }} ({{ mt.total_marks }} marks)</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Score</label>
            <input type="number" name="score" step="0.01" min="0" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Remarks</label>
            <textarea name="remarks" class="form-control" rows="2" placeholder="Optional feedback..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Score</button>
          <a href="{% url 'trainer_batch_detail' batch.id %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
